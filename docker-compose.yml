services:
  mysql:
    image: mysql:8.4
    container_name: gov_oracle_mysql
    environment:
      MYSQL_ROOT_PASSWORD: gov_oracle_root
      MYSQL_DATABASE: gov_oracle
      MYSQL_USER: gov_oracle
      MYSQL_PASSWORD: gov_oracle
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pgov_oracle_root"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: gov_oracle_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
  redis_data:
